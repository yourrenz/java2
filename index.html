<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AR Strings — Yüksek Voltaj</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#020609; --c1:#00ffe0; --c2:#ff2d78; --c3:#ffe100; --c4:#a259ff; --c5:#00aaff; }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); font-family:'Space Grotesk',sans-serif; height:100dvh; overflow:hidden; }

    #webcam {
      position:fixed; inset:0; width:100%; height:100%;
      object-fit:cover; transform:scaleX(-1);
    }
    #cvs { position:fixed; inset:0; width:100%; height:100%; z-index:2; }

    header {
      position:fixed; top:0; left:0; right:0; z-index:20;
      display:flex; justify-content:space-between; align-items:center;
      padding:14px 22px;
      background:rgba(2,6,9,0.7); backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(0,255,224,0.12);
    }
    .logo { display:flex; align-items:center; gap:10px; }
    .pulse {
      width:9px; height:9px; border-radius:50%;
      background:var(--c1); box-shadow:0 0 10px var(--c1);
      animation:blink 1.8s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .logo-text { font-size:14px; font-weight:700; letter-spacing:3px; color:var(--c1); }
    .spill {
      font-size:11px; font-weight:600; letter-spacing:1.5px;
      padding:5px 14px; border-radius:20px; border:1px solid;
      transition:all .3s;
    }
    .s-load { border-color:#ffaa00; color:#ffaa00; }
    .s-ok   { border-color:#00ff88; color:#00ff88; }
    .s-on   { border-color:var(--c1); color:var(--c1); background:rgba(0,255,224,0.08); }

    .strip {
      position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
      z-index:20; display:flex; gap:8px;
      background:rgba(2,6,9,0.78); border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(16px); padding:8px 14px; border-radius:50px;
      transition:opacity .4s;
      flex-wrap: wrap; justify-content: center; width: max-content; max-width: 90vw;
    }
    .strip.hide { opacity:0; pointer-events:none; }
    .mbtn {
      font-family:'Space Grotesk',sans-serif;
      font-size:11px; font-weight:600; letter-spacing:1px;
      padding:7px 16px; border-radius:30px;
      border:1px solid rgba(255,255,255,0.15);
      background:transparent; color:rgba(200,232,224,0.55); cursor:pointer; transition:all .2s;
    }
    .mbtn:hover { color:var(--c1); border-color:var(--c1); }
    .mbtn.on { background:var(--c1); color:#020609; border-color:var(--c1); font-weight:700; }
    .mbtn[data-m="elec"].on { background:#ffe100; border-color:#ffe100; color:#000; box-shadow:0 0 15px rgba(255,225,0,0.5); }

    .glabel {
      position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
      z-index:20; font-size:12px; letter-spacing:2px;
      color:rgba(200,232,224,0.45); pointer-events:none; text-align:center;
    }

    #overlay {
      position:fixed; inset:0; z-index:50;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:22px;
      background:rgba(2,6,9,0.93); backdrop-filter:blur(6px);
      transition:opacity .6s;
    }
    #overlay.out { opacity:0; pointer-events:none; }
    .hand-anim { font-size:54px; animation:float 2.8s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-14px) rotate(5deg)} }
    .intro-title { font-size:22px; font-weight:700; letter-spacing:2px; color:#fff; text-align:center; }
    .intro-sub { font-size:13px; color:rgba(200,232,224,0.42); text-align:center; max-width:290px; line-height:1.7; }
    .steps {
      display:flex; flex-direction:column; gap:8px;
      background:rgba(0,255,224,0.04); border:1px solid rgba(0,255,224,0.1);
      border-radius:16px; padding:16px 24px;
    }
    .step { font-size:12px; color:rgba(200,232,224,0.5); letter-spacing:.5px; }
    .step strong { color:var(--c1); }
    #btnGo {
      font-family:'Space Grotesk',sans-serif;
      font-weight:700; font-size:14px; letter-spacing:2px;
      padding:16px 48px; border-radius:50px; border:none;
      background:var(--c1); color:#020609; cursor:pointer;
      box-shadow:0 0 40px rgba(0,255,224,0.3);
      transition:transform .15s, box-shadow .15s;
    }
    #btnGo:disabled { opacity:.35; cursor:not-allowed; }
    #btnGo:not(:disabled):hover { transform:scale(1.04); box-shadow:0 0 60px rgba(0,255,224,0.5); }
  </style>
</head>
<body>

<video id="webcam" autoplay playsinline muted></video>
<canvas id="cvs"></canvas>

<header>
  <div class="logo">
    <div class="pulse" id="dot"></div>
    <span class="logo-text">AR STRINGS</span>
  </div>
  <div class="spill s-load" id="pill">YÜKLÜYOR</div>
</header>

<div class="strip hide" id="strip">
  <button class="mbtn on" data-m="5">5 İP</button>
  <button class="mbtn" data-m="elec">⚡ ELEKTRİK</button>
  <button class="mbtn" data-m="2">2 İP</button>
  <button class="mbtn" data-m="web">AĞ</button>
  <button class="mbtn" data-m="wave">DALGA</button>
</div>

<div class="glabel" id="glabel"></div>

<div id="overlay">
  <div class="hand-anim">🤲</div>
  <div class="intro-title">DİJİTAL İP SİMÜLASYONU</div>
  <div class="intro-sub">İki elinizi kameraya gösterin — parmaklarınız arasında fizik motorlu neon ipler oluşur.</div>
  <div class="steps">
    <div class="step"><strong>5 İP</strong> — Her parmak çifti arasında bir ip</div>
    <div class="step"><strong style="color:#ffe100">ELEKTRİK</strong> — Çoklu, sesli çatırtılı enerji arkları</div>
    <div class="step"><strong>2 İP</strong> — Başparmak ve işaret parmağı</div>
    <div class="step"><strong>AĞ</strong> — Tüm parmaklar çapraz bağlı</div>
  </div>
  <button id="btnGo" disabled>KAMERAYI AÇ</button>
</div>

<script type="module">
import { HandLandmarker, FilesetResolver } 
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const video   = document.getElementById("webcam");
const cvs     = document.getElementById("cvs");
const ctx     = cvs.getContext("2d");
const pill    = document.getElementById("pill");
const dot     = document.getElementById("dot");
const overlay = document.getElementById("overlay");
const strip   = document.getElementById("strip");
const glabel  = document.getElementById("glabel");
const btnGo   = document.getElementById("btnGo");

// MediaPipe finger tip indices
const TIPS   = [4, 8, 12, 16, 20];
const COLORS = ["#00ffe0","#ff2d78","#ffe100","#a259ff","#00aaff"];

let mode = "5";
let handLM, running = false, lastTime = -1, globalHue = 0;

/* ── AUDIO SYNTH (VIZZT / ELEKTRİK SESİ) ─── */
let audioCtx, masterGain, sparkOsc, sparkGain;
function initElectricSound() {
  if (audioCtx) return;
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  audioCtx = new AudioContext();
  
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0;
  masterGain.connect(audioCtx.destination);

  // Ana şebeke vızıltısı (Low Hum)
  const humOsc = audioCtx.createOscillator();
  humOsc.type = "sawtooth";
  humOsc.frequency.value = 55; // 55Hz
  humOsc.connect(masterGain);
  humOsc.start();

  // Çatırtı / Kıvılcım sesi (High Frequency Crackle)
  sparkOsc = audioCtx.createOscillator();
  sparkOsc.type = "square";
  
  const sparkFilter = audioCtx.createBiquadFilter();
  sparkFilter.type = "highpass";
  sparkFilter.frequency.value = 1500;
  
  sparkGain = audioCtx.createGain();
  sparkGain.gain.value = 0;
  
  sparkOsc.connect(sparkFilter);
  sparkFilter.connect(sparkGain);
  sparkGain.connect(masterGain);
  sparkOsc.start();

  // Çatırtıyı rastgele zamanlarda tetikleyen döngü
  setInterval(() => {
    if (masterGain.gain.value > 0.05 && Math.random() > 0.3) {
      // Rastgele frekans atlamaları (vızzt efekti)
      sparkOsc.frequency.setValueAtTime(200 + Math.random() * 2000, audioCtx.currentTime);
      sparkGain.gain.setValueAtTime(0.05 + Math.random() * 0.15, audioCtx.currentTime);
      sparkGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
    }
  }, 40);
}

function setAudioState(isActive) {
  if (!audioCtx) return;
  const targetVol = isActive ? 0.25 : 0;
  masterGain.gain.setTargetAtTime(targetVol, audioCtx.currentTime, 0.1);
}


/* ── VERLET ROPE FİZİK MOTORU ────────────── */
class Rope {
  constructor(n, color) {
    this.n = n; this.color = color; this.rest = 10;
    this.pts = Array.from({length:n}, () => ({x:0,y:0,ox:0,oy:0}));
  }
  update(x0, y0, x1, y1) {
    const p = this.pts, n = this.n;
    p[0].x=x0; p[0].y=y0; p[n-1].x=x1; p[n-1].y=y1;
    for (let i=1; i<n-1; i++) {
      let vx=(p[i].x-p[i].ox)*0.93, vy=(p[i].y-p[i].oy)*0.93+1.3;
      p[i].ox=p[i].x; p[i].oy=p[i].y;
      p[i].x+=vx; p[i].y+=vy;
    }
    for (let it=0; it<14; it++) {
      for (let i=0; i<n-1; i++) {
        const a=p[i], b=p[i+1];
        const dx=b.x-a.x, dy=b.y-a.y;
        const d=Math.sqrt(dx*dx+dy*dy)||1;
        const c=(this.rest-d)/d/2;
        const ox=dx*c, oy=dy*c;
        if (i!==0)   {a.x-=ox; a.y-=oy;}
        if (i+1!==n-1) {b.x+=ox; b.y+=oy;}
      }
    }
  }
  
  draw(col, w=3.5, isElectric=false) {
    const p=this.pts, n=this.n;
    for (let i=0; i<n-1; i++) {
      const t=i/n;
      let c = col || this.color;
      if (mode==="wave") c=`hsl(${(globalHue+t*180)%360},100%,65%)`;
      if (isElectric) c = Math.random() > 0.8 ? "#ffffff" : "#ffe100"; // Elektrik modunda sarı-beyaz patlamalar

      ctx.beginPath(); ctx.moveTo(p[i].x,p[i].y); ctx.lineTo(p[i+1].x,p[i+1].y);
      ctx.strokeStyle=c; ctx.lineWidth=w; ctx.lineCap="round";
      ctx.shadowColor=c; ctx.shadowBlur= isElectric ? 25 : 20; 
      ctx.stroke();
    }

    // Elektrik modundaysa ana ipin etrafına titreyen ince arklar (kablolar) çiz
    if (isElectric) {
      for (let j = 0; j < 3; j++) { // 3 ekstra çatırtılı dalga
        ctx.beginPath();
        for (let i=0; i<n; i++) {
          let jitterX = (Math.random() - 0.5) * 18;
          let jitterY = (Math.random() - 0.5) * 18;
          // Başlangıç ve bitiş noktalarını parmaklara sabitle
          if (i === 0 || i === n-1) { jitterX = 0; jitterY = 0; }
          
          if(i===0) ctx.moveTo(p[i].x + jitterX, p[i].y + jitterY);
          else ctx.lineTo(p[i].x + jitterX, p[i].y + jitterY);
        }
        ctx.strokeStyle = Math.random() > 0.5 ? "#00ffe0" : "#ffffff";
        ctx.lineWidth = Math.random() * 2;
        ctx.shadowBlur = 10;
        ctx.stroke();
      }
    }
    ctx.shadowBlur=0;
  }
}

/* ── ROPE POOLS ──────────────────────────── */
const ropePool = COLORS.map(c => new Rope(26, c));
const webPool  = Array.from({length:25}, () => new Rope(16,"#fff"));

/* ── PARTICLES (Kıvılcımlar) ─────────────── */
const pfx = [];
function spawnPfx(x,y,col, amount=2) {
  for (let i=0;i<amount;i++) pfx.push({
    x,y, vx:(Math.random()-.5)*6, vy:(Math.random()-.5)*6-1,
    life:1, col, r:Math.random()*3+.5
  });
}
function drawPfx() {
  for (let i=pfx.length-1;i>=0;i--) {
    const p=pfx[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.05;
    if (p.life<=0) { pfx.splice(i,1); continue; }
    ctx.globalAlpha=p.life;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctx.fillStyle=p.col; ctx.shadowColor=p.col; ctx.shadowBlur=12; ctx.fill();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

/* ── NODE DOT ────────────────────────────── */
function node(x,y,col,big=false) {
  ctx.beginPath(); ctx.arc(x,y,big?9:6,0,Math.PI*2);
  ctx.fillStyle="#fff"; ctx.shadowColor=col; ctx.shadowBlur=24; ctx.fill();
  ctx.shadowBlur=0;
}

/* ── LOAD MODEL ──────────────────────────── */
async function loadModel() {
  const v = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );
  handLM = await HandLandmarker.createFromOptions(v, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU",
    },
    runningMode:"VIDEO", numHands:2,
    minHandDetectionConfidence:.55, minTrackingConfidence:.55,
  });
  pill.textContent="HAZIR"; pill.className="spill s-ok";
  dot.style.cssText="width:9px;height:9px;border-radius:50%;background:#00ff88;box-shadow:0 0 10px #00ff88";
  btnGo.disabled=false;
}
loadModel();

/* ── LOOP ────────────────────────────────── */
function loop() {
  if (!running) return;
  if (video.readyState>=2 && lastTime!==video.currentTime) {
    lastTime=video.currentTime;
    cvs.width=video.clientWidth; cvs.height=video.clientHeight;
    const W=cvs.width, H=cvs.height;
    ctx.clearRect(0,0,W,H);
    ctx.save(); ctx.translate(W,0); ctx.scale(-1,1);
    globalHue=(globalHue+1.2)%360;

    const res=handLM.detectForVideo(video, performance.now());
    const hands=res.landmarks;
    let isActive = false; // Ses kontrolü için

    if (hands && hands.length>=2) {
      isActive = true;
      const h0=hands[0], h1=hands[1];
      glabel.textContent="İKİ EL ALGILANDI";
      pill.textContent="AKTİF"; pill.className="spill s-on";

      if (mode==="5" || mode==="wave" || mode==="elec") {
        const isElec = (mode === "elec");
        TIPS.forEach((tip,ri) => {
          const ax=h0[tip].x*W, ay=h0[tip].y*H;
          const bx=h1[tip].x*W, by=h1[tip].y*H;
          ropePool[ri].update(ax,ay,bx,by);
          ropePool[ri].draw(null, isElec ? 5 : 3.5, isElec);
          node(ax,ay, isElec ? "#ffe100" : COLORS[ri]); 
          node(bx,by, isElec ? "#ffe100" : COLORS[ri]);
          spawnPfx(ax,ay, isElec ? "#ffffff" : COLORS[ri], isElec ? 4 : 2); 
          spawnPfx(bx,by, isElec ? "#ffffff" : COLORS[ri], isElec ? 4 : 2);
        });

      } else if (mode==="2") {
        [[0,4],[1,8]].forEach(([ri,tip]) => {
          const ax=h0[tip].x*W, ay=h0[tip].y*H;
          const bx=h1[tip].x*W, by=h1[tip].y*H;
          ropePool[ri].update(ax,ay,bx,by);
          ropePool[ri].draw(null,5.5);
          node(ax,ay,COLORS[ri],true); node(bx,by,COLORS[ri],true);
          spawnPfx(ax,ay,COLORS[ri]); spawnPfx(bx,by,COLORS[ri]);
        });

      } else if (mode==="web") {
        let wi=0;
        for (let a=0;a<TIPS.length;a++) {
          for (let b=0;b<TIPS.length;b++) {
            if (wi>=webPool.length) break;
            const ax=h0[TIPS[a]].x*W, ay=h0[TIPS[a]].y*H;
            const bx=h1[TIPS[b]].x*W, by=h1[TIPS[b]].y*H;
            const col=`hsl(${(globalHue+wi*36)%360},100%,62%)`;
            webPool[wi].color=col;
            webPool[wi].update(ax,ay,bx,by);
            webPool[wi].draw(col,2);
            wi++;
          }
        }
        TIPS.forEach((tip,ri) => {
          node(h0[tip].x*W, h0[tip].y*H, COLORS[ri]);
          node(h1[tip].x*W, h1[tip].y*H, COLORS[ri]);
        });
      }

    } else if (hands && hands.length===1) {
      isActive = true;
      const h=hands[0];
      glabel.textContent="TEK EL — İKİ ELİ GÖSTER";
      pill.textContent="HAZIR"; pill.className="spill s-ok";
      const tx=h[4].x*W, ty=h[4].y*H;
      const isElec = (mode === "elec");

      [8,12,16,20].forEach((tip,i) => {
        const fx=h[tip].x*W, fy=h[tip].y*H;
        ropePool[i].update(tx,ty,fx,fy);
        ropePool[i].draw(null, isElec ? 4 : 3, isElec);
        node(fx,fy, isElec ? "#ffe100" : COLORS[i+1]); 
        spawnPfx(fx,fy, isElec ? "#fff" : COLORS[i+1], isElec ? 3 : 2);
      });
      node(tx,ty, isElec ? "#ffe100" : COLORS[0],true); 
      spawnPfx(tx,ty, isElec ? "#fff" : COLORS[0], isElec ? 4 : 2);
    } else {
      glabel.textContent="ELLERİNİZİ KAMERAYA GÖSTERİN";
      pill.textContent="HAZIR"; pill.className="spill s-ok";
    }

    // Elektrik modundaysa ve eller ekrandaysa sesi aç, eller giderse veya mod değişirse sesi kıs
    setAudioState(isActive && mode === "elec");

    drawPfx();
    ctx.restore();
  }
  requestAnimationFrame(loop);
}

/* ── CAM & INIT ──────────────────────────── */
btnGo.addEventListener("click", async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:"user", width:{ideal:1280}, height:{ideal:720}}
    });
    video.srcObject=stream;
    video.onloadedmetadata=() => {
      video.play(); running=true;
      overlay.classList.add("out");
      strip.classList.remove("hide");
      initElectricSound(); // Ses sistemini başlat
      loop();
    };
  } catch { alert("Kamera erişimi reddedildi."); }
});

/* ── MODE BTNS ───────────────────────────── */
document.querySelectorAll(".mbtn").forEach(b => {
  b.addEventListener("click", () => {
    document.querySelectorAll(".mbtn").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); mode=b.dataset.m;
  });
});

window.addEventListener("resize", () => {
  if (running) { cvs.width=video.clientWidth; cvs.height=video.clientHeight; }
});
</script>
</body>
</html>
