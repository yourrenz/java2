<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dijital İp Oyunu (AR Strings)</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050a0e;
      --teal: #00e5cc;
      --pink: #ff4081;
      --text: #cce8e0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Space Mono', monospace;
      height: 100vh; overflow: hidden;
      display: flex; flex-direction: column;
    }

    header {
      padding: 15px; background: rgba(5, 10, 14, 0.8);
      position: absolute; top: 0; width: 100%; z-index: 10;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(0, 229, 204, 0.3);
    }
    h1 { font-size: 16px; color: var(--teal); letter-spacing: 2px; text-shadow: 0 0 10px rgba(0,229,204,0.5); }
    
    .status { font-size: 12px; color: #69ff47; }

    .canvas-wrap {
      position: relative; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    
    #webcam, #output_canvas {
      position: absolute; width: 100%; height: 100%; object-fit: cover;
    }
    #webcam.mirror, #output_canvas.mirror {
      transform: rotateY(180deg);
    }
    #output_canvas { z-index: 2; }

    .btn-start {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      z-index: 20; padding: 15px 30px; font-family: 'Space Mono'; font-weight: bold;
      background: var(--teal); color: var(--bg); border: none; border-radius: 30px;
      cursor: pointer; box-shadow: 0 0 20px rgba(0,229,204,0.4); transition: 0.2s;
    }
    .btn-start:active { transform: translateX(-50%) scale(0.95); }
    .hidden { display: none; }

  </style>
</head>
<body>

  <header>
    <h1>AR DİJİTAL İP SİMÜLASYONU</h1>
    <div class="status" id="status-text">Model Yükleniyor...</div>
  </header>

  <div class="canvas-wrap">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
    <button class="btn-start" id="btnCam" disabled>KAMERAYI AÇ</button>
  </div>

<script type="module">
import {
  HandLandmarker,
  FilesetResolver
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const video = document.getElementById("webcam");
const canvas = document.getElementById("output_canvas");
const ctx = canvas.getContext("2d");
const btnCam = document.getElementById("btnCam");
const statusText = document.getElementById("status-text");

let handLM;
let running = false;
let lastTime = -1;

// --- FİZİK MOTORU: Verlet İp Simülasyonu ---
class PhysicsRope {
  constructor(segments, color) {
    this.points = [];
    this.color = color;
    this.segmentLength = 10; // İpin gerginliği/uzunluğu
    
    // İp üzerindeki noktaları oluştur
    for (let i = 0; i < segments; i++) {
      this.points.push({ x: 0, y: 0, oldX: 0, oldY: 0 });
    }
  }

  update(startX, startY, endX, endY) {
    const p = this.points;
    const len = p.length;

    // Başlangıç ve bitiş noktalarını parmaklara sabitle
    p[0].x = startX; p[0].y = startY;
    p[len - 1].x = endX; p[len - 1].y = endY;

    // Yerçekimi ve İvme hesaplaması
    for (let i = 1; i < len - 1; i++) {
      let vx = (p[i].x - p[i].oldX) * 0.95; // Sürtünme
      let vy = (p[i].y - p[i].oldY) * 0.95 + 1.2; // Yerçekimi (+1.2)
      
      p[i].oldX = p[i].x;
      p[i].oldY = p[i].y;
      
      p[i].x += vx;
      p[i].y += vy;
    }

    // Mesafe kısıtlamaları (İpin kopmamasını sağlar)
    // Ne kadar çok dönerse (iteration), ip o kadar sert olur.
    for (let iter = 0; iter < 10; iter++) {
      for (let i = 0; i < len - 1; i++) {
        let p1 = p[i];
        let p2 = p[i + 1];
        
        let dx = p2.x - p1.x;
        let dy = p2.y - p1.y;
        let dist = Math.sqrt(dx * dx + dy * dy) || 1;
        
        let diff = this.segmentLength - dist;
        let percent = (diff / dist) / 2;
        
        let offsetX = dx * percent;
        let offsetY = dy * percent;

        if (i !== 0) {
          p1.x -= offsetX;
          p1.y -= offsetY;
        }
        if (i + 1 !== len - 1) {
          p2.x += offsetX;
          p2.y += offsetY;
        }
      }
    }
  }

  draw(ctx) {
    ctx.beginPath();
    ctx.moveTo(this.points[0].x, this.points[0].y);
    for (let i = 1; i < this.points.length; i++) {
      ctx.lineTo(this.points[i].x, this.points[i].y);
    }
    
    // Neon Işık Efekti
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 4;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 20;
    ctx.stroke();
    ctx.shadowBlur = 0; // Diğer çizimleri etkilememesi için sıfırla
  }
}

// 2 farklı ip oluşturuyoruz (Başparmaklar arası ve işaret parmakları arası)
const ropeThumbs = new PhysicsRope(25, "#00e5cc"); // Turkuaz
const ropeIndexes = new PhysicsRope(25, "#ff4081"); // Pembe

// --- MEDIAPIPE KURULUMU ---
async function setupModel() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );
  handLM = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU"
    },
    runningMode: "VIDEO",
    numHands: 2, // 2 eli de takip et
    minHandDetectionConfidence: 0.6,
    minTrackingConfidence: 0.6
  });

  statusText.textContent = "Sistem Hazır";
  btnCam.disabled = false;
}
setupModel();

// --- ANA DÖNGÜ ---
function predict() {
  if (!running) return;

  if (video.readyState >= 2) {
    if (lastTime !== video.currentTime) {
      lastTime = video.currentTime;
      
      canvas.width = video.clientWidth;
      canvas.height = video.clientHeight;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Ön kamera ayna efekti için context'i çevir
      ctx.save();
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);

      const hR = handLM.detectForVideo(video, performance.now());
      const hands = hR.landmarks;

      if (hands && hands.length > 0) {
        const w = canvas.width;
        const h = canvas.height;

        // Ekranda 2 el varsa, ipleri ellerin arasına çek
        if (hands.length === 2) {
          const thumb1 = { x: hands[0][4].x * w, y: hands[0][4].y * h };
          const index1 = { x: hands[0][8].x * w, y: hands[0][8].y * h };
          
          const thumb2 = { x: hands[1][4].x * w, y: hands[1][4].y * h };
          const index2 = { x: hands[1][8].x * w, y: hands[1][8].y * h };

          ropeThumbs.update(thumb1.x, thumb1.y, thumb2.x, thumb2.y);
          ropeIndexes.update(index1.x, index1.y, index2.x, index2.y);

          ropeThumbs.draw(ctx);
          ropeIndexes.draw(ctx);
        } 
        // Ekranda tek el varsa, ipi başparmak ile işaret parmağı arasına çek
        else if (hands.length === 1) {
          const thumb = { x: hands[0][4].x * w, y: hands[0][4].y * h };
          const index = { x: hands[0][8].x * w, y: hands[0][8].y * h };

          ropeThumbs.update(thumb.x, thumb.y, index.x, index.y);
          ropeThumbs.draw(ctx);
        }

        // Parmak uçlarına parlayan noktalar ekle
        hands.forEach(hand => {
          [4, 8].forEach(pointIndex => {
            ctx.beginPath();
            ctx.arc(hand[pointIndex].x * w, hand[pointIndex].y * h, 6, 0, 2 * Math.PI);
            ctx.fillStyle = "#ffffff";
            ctx.shadowColor = "#ffffff";
            ctx.shadowBlur = 10;
            ctx.fill();
          });
        });
      }
      ctx.restore();
    }
  }
  requestAnimationFrame(predict);
}

// --- KAMERA BAŞLATMA ---
btnCam.addEventListener("click", async () => {
  if (!running) {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    video.classList.add("mirror"); // CSS ayna efekti
    
    video.onloadedmetadata = () => {
      video.play();
      running = true;
      btnCam.classList.add("hidden");
      predict();
    };
  }
});

// Ekran boyutu değiştiğinde canvası güncelle
window.addEventListener("resize", () => {
  if (running) {
    canvas.width = video.clientWidth;
    canvas.height = video.clientHeight;
  }
});
</script>
</body>
</html>
