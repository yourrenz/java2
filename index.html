<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dijital İp Ağı (Cat's Cradle AR)</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050a0e;
      --teal: #00e5cc;
    }
    body {
      margin: 0; padding: 0;
      background-color: var(--bg);
      font-family: 'Space Mono', monospace;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    header {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 15px 20px;
      background: rgba(5, 10, 14, 0.8);
      color: var(--teal);
      z-index: 10;
      text-align: center;
      letter-spacing: 2px;
      border-bottom: 1px solid rgba(0, 229, 204, 0.3);
    }
    h1 { font-size: 18px; margin: 0 0 5px 0; text-shadow: 0 0 10px rgba(0,229,204,0.5); }
    p { margin: 0; font-size: 12px; color: #69ff47; }

    #liveView {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Video ve Canvas üst üste ve ayna (mirror) efektli */
    video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* Kamerayı ayna gibi yap */
    }
    canvas {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 2;
    }

    #webcamButton {
      position: absolute;
      bottom: 40px;
      z-index: 10;
      background-color: var(--teal);
      color: var(--bg);
      border: none;
      padding: 15px 30px;
      font-size: 14px;
      font-weight: bold;
      font-family: 'Space Mono', monospace;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0,229,204,0.5);
      transition: transform 0.2s;
    }
    #webcamButton:active { transform: scale(0.95); }
    .removed { display: none !important; }
  </style>
</head>
<body>

  <header>
    <h1>DİJİTAL İP AĞI (CAT'S CRADLE)</h1>
    <p id="status-text">Model Yükleniyor, lütfen bekleyin...</p>
  </header>

  <div id="liveView">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
    <button id="webcamButton" disabled>KAMERAYI AÇ</button>
  </div>

<script type="module">
import {
  HandLandmarker,
  FilesetResolver
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

let handLandmarker = undefined;
let webcamRunning = false;
let lastVideoTime = -1;

const video = document.getElementById("webcam");
const canvasElement = document.getElementById("output_canvas");
const canvasCtx = canvasElement.getContext("2d");
const enableWebcamButton = document.getElementById("webcamButton");
const statusText = document.getElementById("status-text");

// 1. MEDIAPIPE MODELİNİ YÜKLE
const createHandLandmarker = async () => {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );
  handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU"
    },
    runningMode: "VIDEO",
    numHands: 2 // İki eli de algıla
  });
  
  statusText.textContent = "Sistem Hazır. Kamerayı açabilirsiniz.";
  statusText.style.color = "#00e5cc";
  enableWebcamButton.disabled = false;
};
createHandLandmarker();

// 2. KAMERAYI BAŞLAT
const hasGetUserMedia = () => !!navigator.mediaDevices?.getUserMedia;

if (hasGetUserMedia()) {
  enableWebcamButton.addEventListener("click", enableCam);
} else {
  console.warn("Tarayıcınız kamera erişimini desteklemiyor.");
}

function enableCam(event) {
  if (!handLandmarker) return;

  webcamRunning = true;
  enableWebcamButton.classList.add("removed");

  const constraints = { video: { facingMode: "user" } };

  navigator.mediaDevices.getUserMedia(constraints).then((stream) => {
    video.srcObject = stream;
    video.addEventListener("loadeddata", predictWebcam);
  });
}

// 3. İP ÇİZİM FONKSİYONU (Sarkma ve Neon Efektli)
function drawString(ctx, p1, p2, color) {
  const dx = p2.x - p1.x;
  const dy = p2.y - p1.y;
  const dist = Math.sqrt(dx*dx + dy*dy);

  // Mesafe arttıkça ip aşağı doğru sarkar (Yerçekimi hissi)
  const sag = dist * 0.15; 
  const cx = (p1.x + p2.x) / 2;
  const cy = ((p1.y + p2.y) / 2) + sag;

  ctx.beginPath();
  ctx.moveTo(p1.x, p1.y);
  // Düz çizgi (lineTo) yerine kavisli çizgi (quadraticCurveTo) kullanıyoruz
  ctx.quadraticCurveTo(cx, cy, p2.x, p2.y);

  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5;
  ctx.shadowColor = color;
  ctx.shadowBlur = 12; // Neon parlama
  ctx.stroke();
  
  ctx.shadowBlur = 0; // Diğer çizimleri etkilememesi için sıfırla
}

// 4. SÜREKLİ TAHMİN VE ÇİZİM DÖNGÜSÜ
async function predictWebcam() {
  canvasElement.style.width = video.clientWidth + "px";
  canvasElement.style.height = video.clientHeight + "px";
  canvasElement.width = video.clientWidth;
  canvasElement.height = video.clientHeight;
  
  let startTimeMs = performance.now();
  let results = undefined;

  if (lastVideoTime !== video.currentTime) {
    lastVideoTime = video.currentTime;
    results = handLandmarker.detectForVideo(video, startTimeMs);
  }

  canvasCtx.save();
  canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

  if (results && results.landmarks.length > 0) {
    const w = canvasElement.width;
    const h = canvasElement.height;
    
    // Parmak ucu indeksleri: Başparmak(4), İşaret(8), Orta(12), Yüzük(16), Serçe(20)
    const tips = [4, 8, 12, 16, 20];
    const colors = ["#00e5cc", "#ff4081", "#ffd600", "#69ff47", "#e040fb"];

    // Koorinatları ayna moduna (mirror) göre hesaplama yardımcısı
    const getPoint = (lm) => ({ x: (1 - lm.x) * w, y: lm.y * h });

    if (results.landmarks.length === 2) {
      // İKİ EL EKRANDAYSA: Ay Sefası (Cat's cradle) ağı ör
      const hand1 = results.landmarks[0];
      const hand2 = results.landmarks[1];

      // Aynı parmakları karşılıklı bağla (Baş->Baş, İşaret->İşaret vs.)
      for (let i = 0; i < tips.length; i++) {
        const p1 = getPoint(hand1[tips[i]]);
        const p2 = getPoint(hand2[tips[i]]);
        drawString(canvasCtx, p1, p2, colors[i]);
      }

      // Çapraz bağlar ekle (Ağ hissiyatını güçlendirmek için)
      drawString(canvasCtx, getPoint(hand1[4]), getPoint(hand2[20]), "#ffffff"); // Sol Baş -> Sağ Serçe
      drawString(canvasCtx, getPoint(hand1[20]), getPoint(hand2[4]), "#ffffff"); // Sol Serçe -> Sağ Baş
      drawString(canvasCtx, getPoint(hand1[8]), getPoint(hand2[12]), "#00e5cc"); // Sol İşaret -> Sağ Orta
      drawString(canvasCtx, getPoint(hand1[12]), getPoint(hand2[8]), "#ff4081"); // Sol Orta -> Sağ İşaret

    } else if (results.landmarks.length === 1) {
      // TEK EL EKRANDAYSA: Kendi parmakları arasında yıldız şeklinde ağ ör
      const hand = results.landmarks[0];
      const thumbPoint = getPoint(hand[4]); // Başparmak merkez nokta

      for (let i = 1; i < tips.length; i++) {
        const p = getPoint(hand[tips[i]]);
        drawString(canvasCtx, thumbPoint, p, colors[i]); // Başparmaktan diğer parmaklara
      }
    }

    // Ekstra Detay: Tüm parmak uçlarına parlak neon noktalar çiz
    results.landmarks.forEach(hand => {
      tips.forEach((tipIndex, idx) => {
        const p = getPoint(hand[tipIndex]);
        canvasCtx.beginPath();
        canvasCtx.arc(p.x, p.y, 5, 0, 2 * Math.PI);
        canvasCtx.fillStyle = "#ffffff";
        canvasCtx.shadowColor = colors[idx];
        canvasCtx.shadowBlur = 15;
        canvasCtx.fill();
        canvasCtx.shadowBlur = 0;
      });
    });
  }
  
  canvasCtx.restore();

  if (webcamRunning === true) {
    window.requestAnimationFrame(predictWebcam);
  }
}
</script>
</body>
</html>
